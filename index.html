<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมสร้างสลิปเงินเดือน</title>
    <!-- เพิ่มไลบรารีสำหรับสร้าง PDF และ ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap');
        
        :root {
            --primary-text: #333;
            --secondary-text: #6c757d;
            --accent-color: #007bff;
            --background-color: #f4f7f9;
            --card-background: #ffffff;
            --section-background: #f8f9fa;
            --border-color: #dee2e6;
            --net-salary-color: #28a745;
            --export-btn-color: #17a2b8;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--background-color);
            margin: 0; padding: 20px;
        }
        .app-container { max-width: 1100px; margin: 0 auto; }
        .controls-panel {
            background-color: var(--card-background);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 25px;
        }
        .controls-panel h1 { margin-top: 0; }
        
        .top-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .date-picker-section label { font-size: 16px; font-weight: 500; margin-right: 10px; }
        #paymentDate {
            padding: 10px 15px; border: 1px solid var(--border-color);
            border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 16px;
        }

        input[type="file"] { display: none; }
        .file-label {
            background-color: var(--accent-color); color: white; padding: 12px 25px;
            border-radius: 8px; cursor: pointer; display: inline-block; font-size: 16px; font-weight: 500;
        }
        .file-label.odf { background-color: #5a6268; }

        #exportPdfBtn {
            background-color: var(--export-btn-color); color: white; padding: 12px 25px;
            border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500;
            border: none; margin-top: 15px;
        }
        #status-message { margin-top: 15px; font-weight: 500; min-height: 24px; }

        .pagination-controls {
            display: none; justify-content: center; align-items: center;
            gap: 20px; margin-top: 20px;
        }
        .pagination-controls button {
            background-color: var(--accent-color); color: white; border: none;
            padding: 8px 16px; border-radius: 5px; cursor: pointer;
            font-size: 16px; font-family: 'Sarabun', sans-serif;
        }
        .pagination-controls button:disabled { background-color: #ccc; cursor: not-allowed; }
        #page-indicator { font-size: 16px; font-weight: 500; }

        .tab-nav {
            display: flex; gap: 5px; border-bottom: 2px solid var(--border-color);
            margin-bottom: 20px;
        }
        .tab-link {
            padding: 10px 20px; border: none; background-color: transparent;
            font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 500;
            cursor: pointer; border-bottom: 3px solid transparent;
        }
        .tab-link.active { color: var(--accent-color); border-bottom-color: var(--accent-color); }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .payslip-card {
            background-color: var(--card-background); border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 35px;
        }
        .payslip-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        .payslip-header .logo { max-width: 200px; max-height: 150px; }
        .payslip-header .company-info { text-align: right; }
        .payslip-header h2 { margin: 0; font-size: 24px; font-weight: 700; }
        .payslip-header p { margin: 5px 0 0; font-size: 14px; color: var(--secondary-text); }
        
        .divider { border-bottom: 1px solid #e9ecef; margin: 20px 0; }
        .employee-details { background-color: var(--section-background); border-radius: 8px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px 25px; font-size: 15px; }
        .detail-item .label { color: var(--secondary-text); width: 100px; }
        .detail-item .value { font-weight: 500; }
        .main-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .data-box { background-color: var(--section-background); border-radius: 8px; padding: 20px; }
        .data-box h3 { margin: 0 0 15px 0; font-size: 16px; font-weight: 500; color: var(--accent-color); border-bottom: 1px solid #e0e0e0; padding-bottom: 10px; }
        .data-box table { width: 100%; border-collapse: collapse; }
        .data-box td { padding: 8px 5px; font-size: 15px; }
        .data-box .amount { text-align: right; font-weight: 500; }
        .ytd-summary { background-color: var(--section-background); border-radius: 8px; padding: 20px; margin-top: 20px; }
        .ytd-summary h3 { margin: 0 0 15px 0; font-size: 16px; font-weight: 500; color: #17a2b8; border-bottom: 1px solid #e0e0e0; padding-bottom: 10px; }
        .ytd-summary table { width: 100%; } .ytd-summary td { padding: 8px 5px; font-size: 15px; }
        .ytd-summary .amount { font-weight: 500; text-align: right; }
        .summary-footer { background-color: #e9f5ff; border-radius: 8px; padding: 20px; margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; }
        .summary-item .label { font-size: 14px; color: var(--secondary-text); }
        .summary-item .value { font-size: 22px; font-weight: 700; margin-top: 5px; }
        .summary-item .net-value { color: var(--net-salary-color); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="controls-panel">
            <h1>โปรแกรมสร้างสลิปเงินเดือน</h1>
            <div class="top-controls">
                <div class="date-picker-section">
                    <label for="paymentDate">วันที่จ่ายเงิน:</label>
                    <input type="date" id="paymentDate">
                </div>
                <div>
                    <label for="excelFileTR" class="file-label">เลือกไฟล์ TR Excel</label>
                    <input type="file" id="excelFileTR" accept=".xlsx, .xls" onchange="handleFile(event, 'TR')">
                </div>
                <div>
                    <label for="excelFileODF" class="file-label odf">เลือกไฟล์ ODF Excel</label>
                    <input type="file" id="excelFileODF" accept=".xlsx, .xls" onchange="handleFile(event, 'ODF')">
                </div>
            </div>
            <div id="status-message"></div>
            <div id="controls-footer" style="display: none;">
                <button id="exportPdfBtn" onclick="exportAllToZip()">Export to ZIP (ของแท็บที่เลือก)</button>
            </div>
        </div>

        <div id="result-tabs" style="display: none;">
            <div class="tab-nav">
                <button class="tab-link active" data-tab="tr-output">TR</button>
                <button class="tab-link" data-tab="odf-output">ODF</button>
            </div>
             <div class="pagination-controls" id="pagination-nav">
                <button id="prevBtn">ย้อนกลับ</button>
                <span id="page-indicator"></span>
                <button id="nextBtn">ถัดไป</button>
            </div>
            <div id="tr-output" class="tab-pane active"></div>
            <div id="odf-output" class="tab-pane"></div>
        </div>
    </div>

        function normalizeString(str) {
            if (!str) return '';
            return String(str)
                .replace(/^(นาย|นางสาว|นาง|น\.ส\.|ด\.ช\.|ด\.ญ\.)\s*/, '')
                .replace(/[\s\u200B-\u200D\uFEFF]/g, '')
                .toLowerCase();
        }

        const normalizeName = normalizeString; 
        const cleanString = normalizeString;

        function getDataFromSheetWithHeaderDetection(worksheet) {
            if (!worksheet) return new Map();
            const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: null });
            const dataMap = new Map();
            if (rawData.length === 0) return dataMap;

            let headerRowIndex = -1;
            let headerRow = [];
            const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

            for (let i = 0; i < Math.min(5, rawData.length); i++) {
                const potentialHeader = rawData[i];
                // เพิ่มการตรวจสอบเผื่อ header เป็น null
                if (Array.isArray(potentialHeader) && potentialHeader.some(h => typeof h === 'string' && thaiMonths.includes(cleanString(h)))) {
                    headerRowIndex = i;
                    headerRow = potentialHeader.map(h => h ? cleanString(h) : '');
                    break;
                }
            }
             if (headerRowIndex === -1 && Array.isArray(rawData[0])) {
                headerRowIndex = 0;
                headerRow = rawData[0].map(h => h ? cleanString(h) : '');
            }

            if (headerRowIndex === -1) { console.error("Could not find header row"); return dataMap; }

            const nameColumnIndex = headerRow.indexOf(cleanString('ชื่อ-สกุล'));
            if (nameColumnIndex === -1) { console.error("Could not find 'ชื่อ-สกุล' column"); return dataMap; }

            for (let i = headerRowIndex + 1; i < rawData.length; i++) {
                const row = rawData[i];
                if (!row || !row[nameColumnIndex]) continue;
                const fullName = String(row[nameColumnIndex]);
                const normalized = normalizeName(fullName);
                
                if (normalized) {
                    const rowData = {};
                    headerRow.forEach((header, index) => {
                        if (header) {
                            rowData[header] = row[index];
                        }
                    });
                    dataMap.set(normalized, rowData);
                }
            }
            return dataMap;
        }

        function findSheet(workbook, targetName) {
            const normalizedTarget = cleanString(targetName);
            for (const sheetName of workbook.SheetNames) {
                if (cleanString(sheetName) === normalizedTarget) {
                    return workbook.Sheets[sheetName];
                }
            }
            return null;
        }

        async function handleFile(event, companyKey) {
            if (!dateInputElement.value) {
                alert('กรุณาเลือกวันที่จ่ายเงินก่อนครับ');
                event.target.value = '';

            }
            const file = event.target.files[0];
            const reader = new FileReader();
            const statusDiv = document.getElementById('status-message');
            statusDiv.textContent = `กำลังประมวลผลไฟล์ ${companyKey}...`;
            
            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array', cellDates: true });

                    const employeeSheet = findSheet(workbook, 'พนักงาน');
                    if (!employeeSheet) throw new Error("ไม่พบแท็บ 'พนักงาน' ในไฟล์ (กรุณาตรวจสอบการสะกดและช่องว่าง หรือการผสานเซลล์)");
                    const allEmployees = XLSX.utils.sheet_to_json(employeeSheet, { defval: "" });
                    
                    const activeEmployees = allEmployees.filter(emp => {
                        const resignationDate = emp['วันที่ลาออก'];
                        return !resignationDate || String(resignationDate).trim() === '';
                    }).map(emp => {
                        const fullName = emp['ชื่อ-สกุล'] || '';
                        return {
                            fullName: fullName.trim(),
                            normalizedName: normalizeName(fullName),
                            position: emp['ตำแหน่ง'] || ''
                        };
                    });
                    
                    const dataMaps = {};
                    sheetNames.forEach(sheetName => {
                        const sheet = findSheet(workbook, sheetName);
                        if (sheet) {
                           dataMaps[sheetName] = getDataFromSheetWithHeaderDetection(sheet);
                        }
                    });

                    payslipData[companyKey] = activeEmployees.map(employee => {
                        const empDataForHtml = {
                            fullName: employee.fullName,
                            position: employee.position,
                            incomeItems: [],
                            deductionItems: [],
                            ytdData: {},
                            totals: {}
                        };

                        const selectedMonthClean = cleanString(paymentInfo.dataMonthThai);
                        const bringForwardHeader = cleanString('ยกมา');
                        const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                        const currentMonthIndex = thaiMonths.indexOf(paymentInfo.dataMonthThai);
                        
                        let total_income = 0;
                        let total_deduction = 0;

                        // 1. คำนวณรายได้เดือนปัจจุบัน
                        incomeSheets.forEach(sheetName => {
                            const employeeRow = dataMaps[sheetName]?.get(employee.normalizedName);
                            if (employeeRow) {
                                const value = parseFloat(employeeRow[selectedMonthClean]) || 0;
                                if (value !== 0) {
                                    empDataForHtml.incomeItems.push({ item: sheetName, amount: value });
                                    total_income += value;
                                }
                            }
                        });

                        // 2. คำนวณรายการหักเดือนปัจจุบัน (เช็คเงินสะสมติดลบ = คืนเงิน)
                        deductionSheets.forEach(sheetName => {
                            const employeeRow = dataMaps[sheetName]?.get(employee.normalizedName);
                            if (employeeRow) {
                                const value = parseFloat(employeeRow[selectedMonthClean]) || 0;
                                if (value !== 0) {
                                    if (sheetName === "เงินสะสม" && value < 0) {
                                        const refundValue = Math.abs(value);
                                        empDataForHtml.incomeItems.push({ item: "คืนเงินสะสม", amount: refundValue });
                                        total_income += refundValue;
                                    } else {
                                        const absValue = Math.abs(value);
                                        empDataForHtml.deductionItems.push({ item: sheetName, amount: absValue });
                                        total_deduction += absValue;
                                    }
                                }
                            }
                        });

                        empDataForHtml.totals = {
                            income: total_income,
                            deduction: total_deduction,
                            net: total_income - total_deduction
                        };
                        
                        // 3. คำนวณยอดสะสม (ยกมา + มกราคม ถึง เดือนที่เลือก)
                        const ytdSheets = { 
                            'เงินสะสม': 'providentFund', 
                            'ภาษี': 'tax', 
                            'ประกันสังคม': 'socialSecurity',
                            'กยศ': 'studentLoan' ,
	          'เงินยืมบริษัท': 'companyLoan'
                        };
                        
                        for (const sheetName in ytdSheets) {
                            const employeeRow = dataMaps[sheetName]?.get(employee.normalizedName);
                            let monthSum = 0;
                            if (employeeRow) {
                                monthSum += parseFloat(employeeRow[bringForwardHeader]) || 0;
                                for (let m = 0; m <= currentMonthIndex; m++) {
                                    const mName = cleanString(thaiMonths[m]);
                                    monthSum += parseFloat(employeeRow[mName]) || 0;
                                }
                            }
                            empDataForHtml.ytdData[ytdSheets[sheetName]] = Math.abs(monthSum);
                        }
                        
                        let totalYtdIncome = 0;
                        incomeSheets.forEach(sheetName => {
                            const employeeRow = dataMaps[sheetName]?.get(employee.normalizedName);
                            if (employeeRow) {
                                totalYtdIncome += parseFloat(employeeRow[bringForwardHeader]) || 0;
                                for (let m = 0; m <= currentMonthIndex; m++) {
                                    const mName = cleanString(thaiMonths[m]);
                                    totalYtdIncome += parseFloat(employeeRow[mName]) || 0;
                                }
                            }
                        });
                        // เช็คคืนเงินสะสมในอดีต (ถ้ามี) มาบวกเข้ายอดรายได้สะสม
                        const provRowYTD = dataMaps['เงินสะสม']?.get(employee.normalizedName);
                        if (provRowYTD) {
                            for (let m = 0; m <= currentMonthIndex; m++) {
                                const mName = cleanString(thaiMonths[m]);
                                const val = parseFloat(provRowYTD[mName]) || 0;
                                if (val < 0) totalYtdIncome += Math.abs(val);
                            }
                        }
                        empDataForHtml.ytdData.totalIncome = totalYtdIncome;
                        
                        return {
                            name: employee.fullName,
                            html: generatePayslipHTML(empDataForHtml, companyDetails[companyKey])
                        };
                    });

                    statusDiv.textContent = `สร้างสลิปสำหรับ ${companyKey} จำนวน ${payslipData[companyKey].length} ใบเรียบร้อยแล้ว`;
                    statusDiv.style.color = 'var(--net-salary-color)';
                    currentIndices[companyKey] = 0;

                    // --- START OF FIX ---
                    // สลับไปที่แท็บของข้อมูลที่เพิ่งอัปโหลดโดยอัตโนมัติ
                    const targetTabId = `${companyKey.toLowerCase()}-output`;
                    document.querySelectorAll('.tab-link, .tab-pane').forEach(el => el.classList.remove('active'));
                    document.querySelector(`.tab-link[data-tab="${targetTabId}"]`).classList.add('active');
                    document.getElementById(targetTabId).classList.add('active');
                    // --- END OF FIX ---

                    renderCurrentPayslip();

                } catch (error) {
                    statusDiv.textContent = `เกิดข้อผิดพลาด (${companyKey}): ${error.message}`;
                    statusDiv.style.color = 'red';
                    console.error("เกิดข้อผิดพลาดร้ายแรง:", error);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function formatNumber(num) {
            const number = parseFloat(num);
            if (isNaN(number)) return '0.00';
            return number.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function generatePayslipHTML(data, company) {
            const { fullName, position, incomeItems, deductionItems, ytdData, totals } = data;

            const incomeRows = incomeItems.length > 0
                ? incomeItems.map(i => `<tr><td>${i.item}</td><td class="amount">${formatNumber(i.amount)}</td></tr>`).join('')
                : '<tr><td>ไม่มีรายการ</td><td class="amount">0.00</td></tr>';

            const deductionRows = deductionItems.length > 0
                ? deductionItems.map(d => `<tr><td>${d.item}</td><td class="amount">${formatNumber(d.amount)}</td></tr>`).join('')
                : '<tr><td>ไม่มีรายการ</td><td class="amount">0.00</td></tr>';

            // --- ส่วนที่ปรับปรุงใหม่: กรองรายการสะสมที่เป็น 0 ออก ---
            const ytdList = [
                { label: 'รวมรายรับทั้งหมดต่อปี', val: ytdData.totalIncome },
                { label: 'เงินสะสมพนักงานรวม', val: ytdData.providentFund },
                { label: 'ภาษีสะสมรวม', val: ytdData.tax },
                { label: 'ประกันสังคมสะสมรวม', val: ytdData.socialSecurity },
                { label: 'กยศ. สะสมรวม', val: ytdData.studentLoan },
                { label: 'เงินยืมบริษัทสะสมรวม', val: ytdData.companyLoan }
            ].filter(item => item.val > 0);

            const ytdRows = ytdList.map(item => 
                `<tr><td>${item.label}</td><td class="amount">${formatNumber(item.val)}</td></tr>`
            ).join('');

            const ytdSection = ytdList.length > 0 
                ? `<div class="ytd-summary"><h3>ข้อมูลสะสมต่อปี</h3><table>${ytdRows}</table></div>` 
                : '';
            // --------------------------------------------------

            return `
                <div class="payslip-card" data-employee-name="${fullName}">
                    <div class="payslip-header">
                        ${company.logoSrc ? `<img src="${company.logoSrc}" alt="Logo" class="logo">` : ''}
                        <div class="company-info">
                            <h2>${company.name}</h2> <p>${company.address}</p>
                        </div>
                    </div> <div class="divider"></div>
                    <div class="employee-details">
                        <div class="detail-item"><span class="label">ชื่อ-สกุล:</span> <span class="value">${fullName}</span></div>
                        <div class="detail-item"><span class="label">แผนก/ตำแหน่ง:</span> <span class="value">${position || ''}</span></div>
                        <div class="detail-item"><span class="label">ประจำเดือน:</span> <span class="value payslip-month-year">${paymentInfo.monthYear}</span></div>
                        <div class="detail-item"><span class="label">วันที่จ่าย:</span> <span class="value payslip-payment-date">${paymentInfo.fullDate}</span></div>
                    </div>
                    
                    <div class="main-section">
                        <div class="data-box"><h3>รายการได้</h3><table>${incomeRows}</table></div>
                        <div class="data-box"><h3>รายการหัก</h3><table>${deductionRows}</table></div>
                    </div>

                    <div class="summary-footer">
                        <div class="summary-item"><div class="label">รวมเงินได้</div><div class="value">${formatNumber(totals.income)}</div></div>
                        <div class="summary-item"><div class="label">รวมเงินหัก</div><div class="value">${formatNumber(totals.deduction)}</div></div>
                        <div class="summary-item"><div class="label">รายรับสุทธิ</div><div class="value net-value">${formatNumber(totals.net)}</div></div>
                    </div>
                    ${ytdSection}
                </div>`;
        }
        
        async function exportAllToZip() {
            const statusDiv = document.getElementById('status-message');
            const activeCompanyKey = document.querySelector('.tab-link.active').dataset.tab.split('-')[0].toUpperCase();
            const payslips = payslipData[activeCompanyKey];
            if (payslips.length === 0) { alert('ไม่พบสลิปให้ Export ในแท็บนี้'); return; }

            const zip = new JSZip();
            statusDiv.textContent = 'กำลังเตรียมไฟล์ ZIP...';
            
            for (let i = 0; i < payslips.length; i++) {
                const payslip = payslips[i];
                const html = payslip.html;
                const employeeName = payslip.name;

                const tempContainer = document.createElement('div');
                tempContainer.style.position = 'absolute'; tempContainer.style.left = '-9999px';
                tempContainer.style.width = '1100px'; 
                tempContainer.innerHTML = html;
                document.body.appendChild(tempContainer);
                
                const element = tempContainer.querySelector('.payslip-card');
                statusDiv.textContent = `กำลังสร้าง PDF (${i + 1}/${payslips.length}): ${employeeName}`;
                
                const canvas = await html2canvas(element, { scale: 2 });
                const imgData = canvas.toDataURL('image/png');
                
                const pdf = new jsPDF({ orientation: 'l', unit: 'mm', format: 'a5' });
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();

                const imgRatio = canvas.width / canvas.height;
                let finalImgHeight = pageWidth / imgRatio;
                let finalImgWidth = pageWidth;

                if (finalImgHeight > pageHeight) {
                    finalImgHeight = pageHeight;
                    finalImgWidth = finalImgHeight * imgRatio;
                }
                
                const xOffset = (pageWidth - finalImgWidth) / 2;
                const yOffset = (pageHeight - finalImgHeight) / 2;

                pdf.addImage(imgData, 'PNG', xOffset, yOffset, finalImgWidth, finalImgHeight);
                
                const filename = `${employeeName}_${activeCompanyKey}_${paymentInfo.monthName}.pdf`;
                const pdfBlob = pdf.output('blob');
                zip.file(filename, pdfBlob);
                
                document.body.removeChild(tempContainer);
            }

            statusDiv.textContent = 'กำลังบีบอัดไฟล์...';
            zip.generateAsync({ type: "blob", compression: "DEFLATE" })
                .then(function(content) {
                    const zipFilename = `Payslips_${activeCompanyKey}_${paymentInfo.monthName}.zip`;
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = zipFilename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    statusDiv.textContent = `ดาวน์โหลดไฟล์ ${zipFilename} เรียบร้อยแล้ว`;
                });
        }
    </script>
